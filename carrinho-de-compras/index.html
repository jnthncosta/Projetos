<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Loja Online</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>Lojinha Online</h1>
    </header>
    <main>
        <table>
            <thead><!--cabeça da tabela-->
                <tr> <!--determina a quantidade de linha-->
                    <th>Imagem</th><!--determina a quantidade de coluna(table head)-->
                    <th>Produto</th>
                    <th>Preço Unitário</th>
                    <th>Quantidade</th>
                    <th>Total</th>
                </tr>
            </thead>
            <tbody>
                <tr>
                    <td><img src="imagens/celular.jpg" alt="celular" width="100px"></td><!--determina a quantidade de linha (table dado)-->
                    <td>Poco X8 PRO</td>
                    <td>1858</td>
                    <td>0</td>
                    <td>0</td>
                </tr>
                <tr>
                    <td><img src="imagens/notebook.jpg" alt="notebook" width="100px"></td><!--determina a quantidade de linha (table dado)-->
                    <td>Notebook Gamer</td>
                    <td>3500</td>
                    <td>0</td>
                    <td>0</td>
                </tr>
                <tr>
                    <td><img src="imagens/tv.jpg" alt="televisão" width="100px"></td><!--determina a quantidade de linha (table dado)-->
                    <td>TV 50' 4K</td>
                    <td>4500</td>
                    <td>0</td>
                    <td>0</td>
                </tr>
            </tbody>
        </table>
        <div>
            Subtotal: R$0
        </div>
    </main>
    <footer>Site criado por Jonathan para um exercício de criação de site da faculdade</footer>
</body>
</html>
