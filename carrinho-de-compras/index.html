<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Loja Online</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
    <header>
        <h1> <i class="bi bi-cart"></i> Lojinha Online</h1>
    </header>
    <main>
        <table class="table table-hover">
            <thead><!--cabeça da tabela-->
                <tr> <!--determina a quantidade de linha-->
                    <th>Imagem</th><!--determina a quantidade de coluna(table head)-->
                    <th>Produto</th>
                    <th>Preço Unitário</th>
                    <th>Quantidade</th>
                    <th>Total</th>
                </tr>
            </thead>
            <tbody>
                <tr>
                    <td><img src="imagens/celular.jpg" alt="celular" width="100px"></td><!--determina a quantidade de linha (table dado)-->
                    <td>Poco X8 PRO</td>
                    <td id="valor_1">1858</td>
                    <td>
                        <span class="badge text-bg-danger"><i class="bi bi-node-minus"></i></span>
                        <span id="qtd_1">0</span>
                        <span class="badge text-bg-success" onclick="add(1)"><i class="bi bi-plus"></i></span>
                    </td>
                    <td id="total_1">0</td>
                </tr>
                <tr>
                    <td><img src="imagens/notebook.jpg" alt="notebook" width="100px"></td><!--determina a quantidade de linha (table dado)-->
                    <td>Notebook Gamer</td>
                    <td id="valor_2">3500</td>
                    <td>  
                        <span class="badge text-bg-danger"><i class="bi bi-node-minus"></i></span>
                        <span id="qtd_2">0</span>
                        <span class="badge text-bg-success" onclick="add(2)"><i class="bi bi-plus"></i></span></td>
                    <td id="total_2">0</td>
                </tr>
                <tr>
                    <td><img src="imagens/tv.jpg" alt="televisão" width="100px"></td><!--determina a quantidade de linha (table dado)-->
                    <td>TV 50' 4K</td>
                    <td id="valor_3">4500</td>
                    <td>
                        <span class="badge text-bg-danger"><i class="bi bi-node-minus"></i></span>
                        <span id="qtd_3">0</span>
                        <span class="badge text-bg-success" onclick="add(3)"><i class="bi bi-plus"></i></span>
                    </td>
                    <td id="total_3">0</td>
                </tr>
            </tbody>
        </table>
        <div class="text-center">
            <i class="bi bi-bag-heart"></i> Subtotal: R$0
        </div>
    </main>
    <footer>Site criado por Jonathan para um exercício de criação de site da faculdade</footer>
    </div>
    <script src="js.js"></script>
</body>
</html>
